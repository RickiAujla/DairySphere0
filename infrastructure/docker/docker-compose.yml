version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dairysphere-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dairysphere_admin
      POSTGRES_PASSWORD: dairysphere_secure_pass
      POSTGRES_DB: dairysphere_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dairysphere_admin -d dairysphere_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dairysphere-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
